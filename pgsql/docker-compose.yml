name: pg-server
services:
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    depends_on:
      - postgres-test
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: felipe@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - '8080:8080'
    networks:
      - default

  postgres-test:
    image: postgres:18.4-alpine3.24
    volumes:
      - postgres_data:/var/lib/postgresql
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - '5432:5432'
    networks:
      - default
    restart: always

networks:
  default:
    name: postgres_test_network

volumes:
  pgadmin_data:
  postgres_data:


