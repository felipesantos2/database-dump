name: mysql-server

services:
  adminer:
    image: adminer:5.4.2
    container_name: adminer
    depends_on:
      - mysql-test
    environment:
      ADMINER_DEFAULT_SERVER: mysql-test
    ports:
      - '8080:8080'
    networks:
      - default
    restart: always

  mysql-test:
    image: mysql:8.4.8
    container_name: mysql848
    volumes:
      - mysql_data:/var/lib/mysql
      - ./create-first-table.sql:/docker-entrypoint-initdb.d/create-first-table.sql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    ports:
      - '3306:3306'
    networks:
      - default
    restart: always

networks:
  default:
    name: mysql_test_network

volumes:
  mysql_data:


