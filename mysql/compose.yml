services:
  mysql-test:
    image: mysql:8.4.8
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: test_db
    ports:
    - '3306:3306'
    volumes:
    - mysql_data_test:/var/lib/mysql

volumes:
  mysql_data_test:

networks:
  default:
    name: mysql_test_network